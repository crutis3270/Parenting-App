<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Makeba's Parenting App 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#FFF8F0;--card:#fff;--text:#2D2D2D;--muted:#9A9A9A;--border:#F0EDEA;--shadow:0 4px 24px rgba(0,0,0,.07);--radius:22px}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg);font-family:'Quicksand',sans-serif;padding-bottom:80px;color:var(--text)}

/* ── HEADER ── */
.header{background:linear-gradient(110deg,#FF6B6B 0%,#FF9F43 55%,#FFD93D 100%);padding:20px 16px 56px;border-radius:0 0 48px 48px;box-shadow:0 8px 32px rgba(255,107,107,.3);text-align:center;position:relative}
.header h1{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.15)}
.header-who{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.header-avatar{font-size:24px;background:rgba(255,255,255,.25);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.header-name{font-size:13px;font-weight:800;color:#fff}
.header-logout{font-size:11px;font-weight:700;color:rgba(255,255,255,.75);background:rgba(0,0,0,.15);border:none;border-radius:999px;padding:3px 10px;cursor:pointer;font-family:'Quicksand',sans-serif}
.header-sub{color:rgba(255,255,255,.88);font-size:12px;font-weight:600;margin-top:3px}
.notif-bell{position:absolute;top:18px;right:16px;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.notif-bell:hover{transform:scale(1.1)}
.notif-badge{position:absolute;top:-3px;right:-3px;background:#FF3B3B;color:#fff;font-size:9px;font-weight:900;border-radius:999px;padding:1px 5px;font-family:'Quicksand',sans-serif;min-width:16px;text-align:center}

/* ── NOTIF PANEL ── */
.notif-panel{position:fixed;top:0;right:0;bottom:0;width:min(320px,100vw);background:#fff;z-index:800;box-shadow:-8px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.notif-panel.open{transform:translateX(0)}
.notif-panel-head{background:linear-gradient(110deg,#FF6B6B,#FF9F43);padding:18px 16px;display:flex;align-items:center;gap:10px}
.notif-panel-title{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;color:#fff;flex:1}
.notif-close{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;font-size:16px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.notif-list{flex:1;overflow-y:auto;padding:12px}
.notif-item{display:flex;gap:10px;background:#fafafa;border:1.5px solid #f0f0f0;border-radius:14px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.notif-item.unread{border-left:3px solid #FF9F43;background:#FFFDF0}
.ni-icon{font-size:24px;flex-shrink:0}.ni-body{flex:1}.ni-title{font-size:13px;font-weight:800;color:#333;line-height:1.3}.ni-time{font-size:11px;color:#aaa;font-weight:600;margin-top:2px}.ni-dot{width:8px;height:8px;border-radius:50%;background:#FF9F43;flex-shrink:0;margin-top:4px}
.notif-empty{text-align:center;padding:40px 20px;color:#ccc;font-weight:700;font-size:14px}
.notif-footer{padding:12px 16px;border-top:1.5px solid #f0f0f0;display:flex;gap:8px}
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:790;display:none}
.notif-overlay.open{display:block}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--border);display:flex;z-index:100;padding:6px 0 10px;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-family:'Quicksand',sans-serif;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;transition:color .15s}
.nav-btn .nav-icon{font-size:22px;transition:transform .15s}
.nav-btn.active{color:#FF6B6B}
.nav-btn.active .nav-icon{transform:scale(1.15)}
.nav-btn.parent-btn{color:#7C3AED}
.nav-btn.parent-btn.active{color:#7C3AED}
.container{max-width:500px;margin:-36px auto 0;padding:0 14px;position:relative;z-index:1}

/* ── KID TABS ── */
.kid-tabs{display:flex;gap:8px;margin-bottom:12px}
.kid-tab{flex:1;background:#fff;border-radius:18px;padding:10px 6px 8px;text-align:center;box-shadow:var(--shadow);border:2.5px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;position:relative}
.kid-tab:hover{transform:translateY(-2px)}
.kid-tab.active{border-color:var(--kc,#ccc)}
.kid-tab.locked-tab{opacity:.6}
.kid-tab.locked-tab::after{content:'🔒';position:absolute;top:4px;right:6px;font-size:10px}
.kid-tab .av{font-size:26px;display:block}
.kid-tab .kn{font-size:12px;font-weight:800;color:#333;margin-top:2px}
.kid-tab.active .kn{color:var(--kc)}
.kid-tab .kp{font-size:11px;font-weight:700;color:var(--muted);margin-top:1px}
.kid-tab.active .kp{color:var(--kc)}

/* ── CALENDAR STRIP ── */
.cal-strip-wrap{background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:12px 10px 10px;margin-bottom:12px}
.cal-month-row{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:10px}
.cal-month{font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;color:#333}
.cal-week-nav{display:flex;gap:6px}
.cal-nav-btn{background:#f5f5f5;border:none;border-radius:8px;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Quicksand',sans-serif;transition:background .15s}
.cal-nav-btn:hover{background:#ede8ff}
.cal-days{display:flex;gap:5px}
.cal-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 3px;border-radius:12px;cursor:pointer;transition:all .15s;border:2px solid transparent;min-width:0}
.cal-day:hover{background:#FFF8F0}
.cal-day.today{background:linear-gradient(135deg,#FF6B6B,#FF9F43);border-color:transparent}
.cal-day.selected:not(.today){background:#FFF3E0;border-color:#FFD93D}
.cal-day.has-tasks::after{content:'';display:block;width:5px;height:5px;border-radius:50%;background:#FF9F43;margin-top:1px}
.cal-day.today.has-tasks::after{background:#fff}
.cal-day-name{font-size:10px;font-weight:800;color:#aaa}
.cal-day.today .cal-day-name,.cal-day.today .cal-day-num{color:#fff}
.cal-day.selected:not(.today) .cal-day-name{color:#FF9F43}
.cal-day.selected:not(.today) .cal-day-num{color:#FF6B6B;font-weight:900}
.cal-day-num{font-size:15px;font-weight:800;color:#333}
.cal-day.other-week{opacity:.4}
.cal-progress-row{display:flex;gap:4px;margin-top:8px;padding:0 2px}
.cal-prog-item{flex:1;display:flex;flex-direction:column;gap:2px}
.cal-prog-label{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:#aaa}
.cal-prog-track{height:5px;background:#f0f0f0;border-radius:999px;overflow:hidden}
.cal-prog-fill{height:100%;border-radius:999px;transition:width .4s}

/* ── CHORE DAY BADGE ── */
.task-day-badge{font-size:9px;font-weight:800;border-radius:999px;padding:1px 6px;flex-shrink:0}
.task-day-badge.today-badge{background:#FF6B6B;color:#fff}
.task-day-badge.everyday-badge{background:#22c55e20;color:#22c55e;border:1px solid #22c55e40}
.task-day-badge.wrong-day{background:#f0f0f0;color:#bbb}
.task-row.wrong-day-task{opacity:.45;cursor:default}
.task-row.wrong-day-task:hover{transform:none;box-shadow:none}
.task-row.today-task{border-color:var(--tc,#FF6B6B)!important}

/* ── CARD / TASK ── */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.card-head{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1.5px solid var(--border)}
.card-avatar{font-size:46px;line-height:1}
.card-info{flex:1}
.card-name{font-family:'Baloo 2',cursive;font-size:21px;font-weight:800;color:#222}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px}
.badges{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px;background:#FFFDF0;border-bottom:1px solid #f5f5f5}
.badge{font-size:11px;font-weight:800;background:#FFD93D20;color:#9a6f00;border:1.5px solid #FFD93D;border-radius:999px;padding:2px 8px;animation:popIn .4s ease}
.prog-row{display:flex;gap:12px;padding:12px 16px 4px}
.prog-col{flex:1}
.prog-label{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:#777;margin-bottom:4px}
.prog-track{height:9px;background:#f0f0f0;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.sub-tabs{display:flex;gap:6px;margin:10px 14px 0}
.sub-tab{flex:1;padding:8px;border-radius:12px;font-weight:800;font-size:13px;background:#f5f5f5;color:#777;border:none;cursor:pointer;font-family:'Quicksand',sans-serif;transition:all .15s}
.sub-tab.active{color:#fff}
.task-list{padding:10px 12px 4px}
.empty-msg{text-align:center;padding:16px;color:#ccc;font-weight:700;font-size:13px}
.task-row{display:flex;align-items:center;gap:8px;background:#fafafa;border:2px solid #f0f0f0;border-radius:14px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.task-row:hover{transform:translateX(4px);box-shadow:0 4px 14px rgba(0,0,0,.07)}
.task-row.locked-task{cursor:default;opacity:.65}
.task-row.locked-task:hover{transform:none;box-shadow:none}
.task-icon{font-size:20px;flex-shrink:0}
.task-label{flex:1;font-weight:700;font-size:13px;color:#333;line-height:1.3}
.task-label.done{color:#bbb;text-decoration:line-through}
.task-check{width:24px;height:24px;border-radius:50%;flex-shrink:0;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:900;transition:background .2s}
.task-pending{font-size:10px;font-weight:800;color:#FF9F43;background:#FFF3E0;border:1.5px solid #FFD93D;border-radius:999px;padding:2px 7px;flex-shrink:0}

/* ── REWARDS ── */
.rewards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 2px}
.reward-card{border-radius:16px;padding:14px 10px;text-align:center;border:2px solid #eee;background:#f9f9f9;opacity:.5;transition:transform .12s,box-shadow .12s}
.reward-card.unlocked{background:linear-gradient(135deg,#FFF9F0,#FFF3E0);border-color:#FFD93D;opacity:1}
.reward-card.can-redeem:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(255,159,67,.25)}
.reward-card.pending-redeem{border-color:#A78BFA!important;background:linear-gradient(135deg,#F5F0FF,#EDE8FF)!important;opacity:1!important}
.reward-icon{font-size:28px;margin-bottom:3px}
.reward-label{font-size:12px;font-weight:800;color:#333;margin-bottom:3px;line-height:1.3}
.reward-pts{font-size:11px;font-weight:900;color:#bbb;background:#f0f0f0;border-radius:999px;padding:2px 8px;display:inline-block}
.reward-card.unlocked .reward-pts{color:#FF9F43;background:#FFD93D30}
.reward-card.pending-redeem .reward-pts{color:#7C3AED;background:#EDE8FF}
.reward-redeem-btn{margin-top:7px;background:linear-gradient(90deg,#FF9F43,#FFD93D);color:#fff;border:none;border-radius:999px;padding:5px 14px;font-size:11px;font-weight:800;cursor:pointer;font-family:'Quicksand',sans-serif;display:block;width:100%}
.reward-redeem-pending{font-size:10px;color:#7C3AED;font-weight:800;margin-top:5px;animation:pulse 2s infinite}
.reward-unlocked-txt{font-size:10px;color:#22c55e;font-weight:800;margin-top:4px}
.reward-nudge{font-size:10px;color:#FF9F43;font-weight:700;margin-top:5px}
.reward-nudge-bar{height:4px;background:#f0f0f0;border-radius:999px;overflow:hidden;margin-top:4px}
.reward-nudge-fill{height:100%;background:linear-gradient(90deg,#FF9F43,#FFD93D);border-radius:999px}

/* ── APPROVAL BANNER ── */
.approval-banner{background:linear-gradient(90deg,#FF9F43,#FFD93D);border-radius:16px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 4px 14px rgba(255,159,67,.3);animation:pulse-glow 2s infinite}
@keyframes pulse-glow{0%,100%{box-shadow:0 4px 14px rgba(255,159,67,.3)}50%{box-shadow:0 4px 22px rgba(255,159,67,.55)}}
.ab-icon{font-size:28px}.ab-text{flex:1}.ab-title{font-weight:800;font-size:13px;color:#fff}.ab-sub{font-size:11px;color:rgba(255,255,255,.85);font-weight:600}.ab-arrow{font-size:18px;color:#fff}
.section-title{font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;color:#555;margin:14px 0 8px;display:flex;align-items:center;gap:6px}

/* ── LEADERBOARD ── */
.lb-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;margin-bottom:6px;cursor:pointer;transition:transform .12s}
.lb-row:hover{transform:translateX(3px)}
.lb-row.lb-1{background:linear-gradient(90deg,#FFF9E0,#FFF3C0);border:1.5px solid #FFD93D}
.lb-row.lb-2{background:#f8f8f8;border:1.5px solid #ddd}
.lb-row.lb-3{background:linear-gradient(90deg,#FFF3EE,#FFE8DC);border:1.5px solid #FFB899}
.lb-rank{font-size:20px;font-weight:900;min-width:28px;text-align:center}
.lb-avatar{font-size:28px}.lb-info{flex:1}.lb-name{font-size:14px;font-weight:800;color:#333}.lb-detail{font-size:11px;color:#aaa;font-weight:600}.lb-pts{font-size:18px;font-weight:900}

/* ── WEEK SUMMARY ── */
.week-summary-card{background:linear-gradient(135deg,#FFF9F0,#FFF0E0);border:2px solid #FFD93D;border-radius:20px;padding:16px;margin-bottom:12px}
.ws-title{font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;color:#AA6600;margin-bottom:12px}
.ws-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ws-stat{background:rgba(255,255,255,.7);border-radius:12px;padding:10px 6px;text-align:center}
.ws-val{font-size:20px;font-weight:900;color:#333}.ws-lbl{font-size:10px;font-weight:700;color:#aaa;margin-top:2px}

/* ── REWARD HISTORY ── */
.week-section{margin-bottom:14px}
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.week-label{font-family:'Baloo 2',cursive;font-size:13px;font-weight:800;color:#555}
.week-badge{font-size:11px;font-weight:700;background:#FFF3E0;color:#FF9F43;border-radius:999px;padding:2px 8px}
.redeem-history-item{display:flex;align-items:center;gap:10px;background:#fafafa;border:1.5px solid #f0f0f0;border-radius:13px;padding:10px 12px;margin-bottom:6px}
.rhi-icon{font-size:20px}.rhi-info{flex:1}.rhi-name{font-size:13px;font-weight:800;color:#333}.rhi-meta{font-size:11px;color:#aaa;font-weight:600}
.rhi-pts{font-size:12px;font-weight:900;color:#FF6B6B}
.rhi-status{font-size:10px;font-weight:800;border-radius:999px;padding:2px 8px}
.rhi-status.approved{background:#F0FFF4;color:#22c55e}.rhi-status.pending{background:#F5F0FF;color:#7C3AED}.rhi-status.rejected{background:#FFF0F0;color:#FF6B6B}

/* ── CHART ── */
.chart-container{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.chart-title{font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;color:#555;margin-bottom:10px}
.chart-tabs{display:flex;gap:6px;margin-bottom:10px}
.chart-tab{padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;border:2px solid #eee;background:#fafafa;color:#999;cursor:pointer;font-family:'Quicksand',sans-serif;transition:all .15s}
.chart-tab.active{background:#FF6B6B;border-color:#FF6B6B;color:#fff}

/* ── SUMMARY ── */
.summary-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0;border-bottom:1px solid var(--border)}
.summary-row:last-child{border-bottom:none}
.sum-av{font-size:22px}.sum-info{flex:1}.sum-name{font-size:13px;font-weight:800;color:#333}.sum-age{color:#bbb;font-weight:600;font-size:11px}.sum-stats{font-size:12px;font-weight:700;color:#aaa}
.sum-bars{display:flex;gap:4px;margin-top:3px}
.sum-track{flex:1;height:6px;background:#f0f0f0;border-radius:999px;overflow:hidden}
.sum-fill{height:100%;border-radius:999px;transition:width .4s}
.sum-pcts{display:flex;gap:4px;margin-top:2px}
.sum-pct{flex:1;font-size:10px;color:#ccc;font-weight:600}

/* ── DRAG SCHEDULER ── */
.sched-wrap{margin-top:8px}
.sched-day-col{margin-bottom:10px;border:2px solid #f0f0f0;border-radius:14px;overflow:hidden}
.sched-day-head{display:flex;align-items:center;gap:8px;padding:8px 12px;font-weight:800;font-size:13px}
.sched-day-head.today-head{background:linear-gradient(90deg,#FF6B6B22,#FF9F4322)}
.sched-day-name{flex:1;color:#555}
.sched-day-date{font-size:11px;color:#aaa;font-weight:600}
.sched-drop-zone{min-height:44px;padding:6px 8px;background:#fafafa;transition:background .2s}
.sched-drop-zone.drag-over{background:#FFF3E0;border:2px dashed #FF9F43}
.sched-chip{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.5px solid #e0e0e0;border-radius:999px;padding:4px 10px;margin:3px;font-size:12px;font-weight:700;cursor:grab;user-select:none;transition:box-shadow .15s}
.sched-chip:hover{box-shadow:0 3px 10px rgba(0,0,0,.12)}
.sched-chip.dragging{opacity:.45;cursor:grabbing}
.sched-chip .chip-remove{font-size:10px;color:#bbb;cursor:pointer;margin-left:2px}
.sched-chip .chip-remove:hover{color:#FF6B6B}
.sched-unassigned{border:2px dashed #e0e0e0;border-radius:14px;padding:8px;margin-bottom:10px;background:#f9f9f9}
.sched-unassigned-title{font-size:12px;font-weight:800;color:#aaa;margin-bottom:6px;padding:0 4px}
.everyday-toggle{display:flex;align-items:center;gap:8px;background:#F0FFF4;border:1.5px solid #22c55e40;border-radius:12px;padding:6px 10px;margin:3px;cursor:pointer}
.everyday-toggle input{width:16px;height:16px;cursor:pointer;accent-color:#22c55e}
.everyday-toggle span{font-size:12px;font-weight:700;color:#22c55e}

/* ── PARENT FORMS ── */
.form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.form-input{flex:1;border:2px solid #e8e8e8;border-radius:11px;padding:9px 12px;font-size:13px;font-weight:600;outline:none;font-family:'Quicksand',sans-serif;background:#fafafa;color:#333;transition:border-color .2s}
.form-input:focus{border-color:#7C3AED}
.form-select{border:2px solid #e8e8e8;border-radius:11px;padding:9px 8px;font-size:13px;font-weight:600;outline:none;font-family:'Quicksand',sans-serif;background:#fafafa;color:#333}
.btn{border-radius:11px;padding:9px 16px;font-weight:800;font-size:13px;border:none;cursor:pointer;font-family:'Quicksand',sans-serif;transition:transform .12s}
.btn:hover{transform:scale(1.05)}
.btn-purple{background:#7C3AED;color:#fff;box-shadow:0 4px 12px rgba(124,58,237,.25)}
.btn-red{background:#FF6B6B;color:#fff}
.btn-green{background:#22c55e;color:#fff}
.btn-gray{background:#f0f0f0;color:#666}
.btn-orange{background:linear-gradient(90deg,#FF9F43,#FFD93D);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.kid-edit-card{background:#fafafa;border:2px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px}
.kid-edit-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.kid-edit-avatar{font-size:32px}.kid-edit-name{font-weight:800;font-size:15px;color:#333;flex:1}
.avatar-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}

#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e2e;color:#fff;border-radius:999px;padding:11px 20px;font-weight:800;font-size:14px;z-index:9998;display:flex;align-items:center;gap:7px;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s}

.confetti-piece{position:fixed;top:0;border-radius:3px;z-index:9999;pointer-events:none;animation:fall 1.8s ease-in forwards}
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(540deg);opacity:0}}
@keyframes popIn{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

<body>

<div class="header">
  <div style="font-size:32px;margin-bottom:2px">👑</div>
  <h1>Makeba's Parenting App</h1>
  <div class="header-who" id="headerWho" style="display:none"></div>
  <p class="header-sub" id="headerSub">Family Star Chart 🌟</p>
  <button class="notif-bell" id="notifBell" onclick="toggleNotifPanel()" style="display:none">
    🔔<span class="notif-badge" id="notifBadge" style="display:none">0</span>
  </button>
</div>

<div class="container" id="appContainer"></div>

<nav class="nav">
  <button class="nav-btn active" id="navKids" onclick="setPage('kids')"><span class="nav-icon">🏠</span>Kids</button>
  <button class="nav-btn" id="navRewards" onclick="setPage('rewards')"><span class="nav-icon">🎁</span>Rewards</button>
  <button class="nav-btn" id="navChart" onclick="setPage('chart')"><span class="nav-icon">📊</span>Progress</button>
  <button class="nav-btn parent-btn" id="navParent" onclick="requestParent()"><span class="nav-icon">🔐</span>Parent</button>
</nav>

<div id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

<div class="login-screen" id="loginScreen">
  <div class="login-title">Who's here? 👋</div>
  <div class="login-sub">Tap your picture to sign in</div>
  <div class="login-avatars" id="loginAvatars"></div>
  <button class="login-parent-btn" onclick="requestParent()">🔐 Parent Login</button>
</div>

<div class="overlay" id="pinOverlay" style="display:none">
  <div class="pin-box">
    <div id="pinAvatar" style="font-size:44px;margin-bottom:6px"></div>
    <h2 id="pinTitle">Enter PIN</h2>
    <p id="pinHint">Your 4-digit PIN</p>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key btn-gray" onclick="pinCancel()">✕</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
  </div>
</div>

<div class="notif-overlay" id="notifOverlay" onclick="closeNotifPanel()"></div>
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-head">
    <span style="font-size:22px">🔔</span>
    <span class="notif-panel-title">Notifications</span>
    <button class="notif-close" onclick="closeNotifPanel()">✕</button>
  </div>
  <div class="notif-list" id="notifList"></div>
  <div class="notif-footer">
    <button class="btn btn-gray btn-sm" onclick="markAllRead()" style="flex:1">Mark all read</button>
    <button class="btn btn-red btn-sm" onclick="clearNotifs()" style="flex:1">Clear all</button>
  </div>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────
const DAY_NAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DEFAULT_KIDS=[
  {id:1,name:"Malachi",age:4,avatar:"🐣",color:"#FF6B6B",pin:"",
   chores:[{id:101,label:"Put toys away",icon:"🧸",days:[],everyday:true},{id:102,label:"Make my bed",icon:"🛏️",days:[],everyday:true},{id:103,label:"Wash hands",icon:"🧼",days:[],everyday:true},{id:104,label:"Help set table",icon:"🍽️",days:[1,3,5],everyday:false}],
   homework:[{id:111,label:"ABC practice",icon:"🔤",days:[],everyday:true},{id:112,label:"Draw a picture",icon:"🖍️",days:[1,3],everyday:false},{id:113,label:"Read with grown-up",icon:"📖",days:[],everyday:true}]},
  {id:2,name:"Malia",age:9,avatar:"🦊",color:"#FF9F43",pin:"",
   chores:[{id:201,label:"Clean room",icon:"🧹",days:[6],everyday:false},{id:202,label:"Feed the pet",icon:"🐾",days:[],everyday:true},{id:203,label:"Take out trash",icon:"🗑️",days:[1,4],everyday:false},{id:204,label:"Wipe counters",icon:"🧽",days:[],everyday:true},{id:205,label:"Put laundry away",icon:"👕",days:[6],everyday:false}],
   homework:[{id:211,label:"Math worksheet",icon:"➗",days:[],everyday:true},{id:212,label:"Reading (20 min)",icon:"📚",days:[],everyday:true},{id:213,label:"Spelling words",icon:"✏️",days:[1,2,3],everyday:false},{id:214,label:"Science notes",icon:"🔬",days:[2,4],everyday:false}]},
  {id:3,name:"Maya",age:12,avatar:"🐉",color:"#A78BFA",pin:"",
   chores:[{id:301,label:"Vacuum living room",icon:"🌀",days:[6],everyday:false},{id:302,label:"Wash dishes",icon:"🍳",days:[],everyday:true},{id:303,label:"Take out trash",icon:"🗑️",days:[1,4],everyday:false},{id:304,label:"Mow lawn",icon:"🌿",days:[6],everyday:false},{id:305,label:"Organize backpack",icon:"🎒",days:[0],everyday:false}],
   homework:[{id:311,label:"Math homework",icon:"📐",days:[],everyday:true},{id:312,label:"English / essay",icon:"📝",days:[2,4],everyday:false},{id:313,label:"History reading",icon:"📜",days:[1,3],everyday:false},{id:314,label:"Study for test",icon:"🧠",days:[3,4],everyday:false},{id:315,label:"Science project",icon:"⚗️",days:[2,4],everyday:false}]}
];
const DEFAULT_REWARDS=[
  {id:1,pts:20,label:"Extra screen time",icon:"📱"},
  {id:2,pts:40,label:"Pick tonight's dinner",icon:"🍕"},
  {id:3,pts:75,label:"Friend sleepover",icon:"🏕️"},
  {id:4,pts:100,label:"Special outing",icon:"🎡"}
];
const BADGE_DEFS=[
  {id:"streak3",icon:"🔥",label:"3-Day Streak!",check:d=>d.streak>=3},
  {id:"streak7",icon:"⚡",label:"Week Warrior!",check:d=>d.streak>=7},
  {id:"pts50",icon:"⭐",label:"50 Star Club!",check:d=>d.points>=50},
  {id:"pts100",icon:"🏆",label:"Superstar!",check:d=>d.points>=100},
  {id:"allday",icon:"💎",label:"Perfect Day!",check:d=>isAllDayDone(d)}
];
const AVATARS=["🐣","🦊","🐉","🦁","🐼","🐸","🦄","🐯","🦋","🐧","🦅","🐬","🐺","🐻","🐨","🦒"];
const TASK_ICONS_CHORE=["🧹","🛏️","🧸","🍽️","🧼","🗑️","🧽","👕","🌀","🍳","🌿","🎒","💧","🪣","🐾","🔧"];
const TASK_ICONS_HW=["📚","✏️","📐","📝","📜","🧠","⚗️","🔬","➗","🔤","🖍️","📖","📌","🗺️","🎨","💻"];

// ─── STATE ───────────────────────────────────────────────────────
let S=loadState();
function defaultState(){
  const kids={};
  DEFAULT_KIDS.forEach(k=>{
    kids[k.id]={points:0,streak:0,lastDate:null,badges:[],
      chores:k.chores.map(c=>({...c,done:false,pending:false})),
      homework:k.homework.map(h=>({...h,done:false,pending:false}))};
  });
  return {kids,kidDefs:JSON.parse(JSON.stringify(DEFAULT_KIDS)),
    rewards:JSON.parse(JSON.stringify(DEFAULT_REWARDS)),
    pin:"1234",nextKidId:4,nextRewardId:5,nextTaskId:400,
    pendingApprovals:[],pendingRewardApprovals:[],rewardHistory:[],
    notifications:[],weeklyHistory:{},
    settings:{autoResetEnabled:true,autoResetDay:0,lastResetWeek:''}};
}
function loadState(){
  try{
    const r=localStorage.getItem('fsc_v6');
    if(r){
      const s=JSON.parse(r);
      if(!s.pendingRewardApprovals)s.pendingRewardApprovals=[];
      if(!s.rewardHistory)s.rewardHistory=[];
      if(!s.notifications)s.notifications=[];
      if(!s.settings)s.settings={autoResetEnabled:true,autoResetDay:0,lastResetWeek:''};
      if(!s.nextTaskId)s.nextTaskId=400;
      // Ensure days/everyday on all tasks
      s.kidDefs.forEach(k=>{
        ['chores','homework'].forEach(type=>{
          k[type].forEach(t=>{if(!t.days)t.days=[];if(t.everyday===undefined)t.everyday=true;});
          if(s.kids[k.id]){
            s.kids[k.id][type].forEach(t=>{if(!t.days)t.days=[];if(t.everyday===undefined)t.everyday=true;});
          }
        });
      });
      return s;
    }
  }catch(e){}
  return defaultState();
}
function save(){localStorage.setItem('fsc_v6',JSON.stringify(S))}

// ─── SESSION ─────────────────────────────────────────────────────
let page='kids',activeKidId=S.kidDefs[0]?.id||1,activeTab='chores';
let parentUnlocked=false,loggedInKidId=null;
let pinBuffer='',pinMode='parent';
let chartKid=activeKidId,chartType='points';
let selectedViewDate=new Date(); // the day currently selected in calendar strip
let calWeekOffset=0; // 0=current week, -1=last week etc
let collapsibleOpen={};
let chartInstance=null,toastTimer=null;
let dragTaskId=null,dragKidId=null,dragType=null; // for drag scheduler

// ─── HELPERS ─────────────────────────────────────────────────────
function pts(kidId){const k=S.kidDefs.find(x=>x.id===kidId);if(!k)return 5;return k.age<=5?10:k.age<=10?7:5}
function isoWeek(d){const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+4-(dt.getDay()||7));const y=dt.getFullYear();const w=Math.ceil(((dt-new Date(y,0,1))/86400000+1)/7);return `${y}-W${String(w).padStart(2,'0')}`}
function pendingCount(){return S.pendingApprovals.length+S.pendingRewardApprovals.length}
function unreadNotifCount(){return S.notifications.filter(n=>!n.read).length}
function canEdit(kidId){return loggedInKidId===kidId}
function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' '+new Date(ts).toLocaleDateString([],{month:'short',day:'numeric'})}
function isAllDayDone(d){
  const today=new Date().getDay();
  const todayTasks=[...d.chores,...d.homework].filter(t=>t.everyday||t.days?.includes(today));
  return todayTasks.length>0&&todayTasks.every(t=>t.done&&!t.pending);
}
// Is a task active on a given day-of-week?
function taskActiveOnDay(task,dayOfWeek){return task.everyday||task.days?.includes(dayOfWeek)}
// Get tasks for selected view date
function getTasksForDay(kidId,type,date){
  const dow=date.getDay();
  return (S.kids[kidId]?.[type]||[]).filter(t=>taskActiveOnDay(t,dow));
}
function pctForDay(kidId,type,date){
  const tasks=getTasksForDay(kidId,type,date);
  if(!tasks.length)return 0;
  return Math.round(tasks.filter(t=>t.done&&!t.pending).length/tasks.length*100);
}
// Get start-of-week (Sunday) for a given offset
function getWeekStart(offsetWeeks=0){
  const d=new Date();d.setHours(0,0,0,0);
  d.setDate(d.getDate()-d.getDay()+(offsetWeeks*7));
  return d;
}
function todayStr(){return new Date().toDateString()}

function showToast(msg,icon="🎉"){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastIcon').textContent=icon;
  t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}
function confetti(){
  const colors=["#FF6B6B","#FF9F43","#FFD93D","#4ECDC4","#A78BFA","#74C0FC"];
  for(let i=0;i<22;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    const sz=7+Math.random()*9;
    el.style.cssText=`left:${10+Math.random()*80}%;width:${sz}px;height:${sz}px;background:${colors[i%6]};animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
  }
}

// ─── NOTIFICATIONS ───────────────────────────────────────────────
function pushNotif(title,body,icon='🔔'){
  S.notifications.unshift({id:Date.now(),title,body,icon,time:Date.now(),read:false});
  if(S.notifications.length>50)S.notifications=S.notifications.slice(0,50);
  save();updateNotifBell();
}
function updateNotifBell(){
  const cnt=unreadNotifCount();
  const badge=document.getElementById('notifBadge');
  if(badge){badge.textContent=cnt>9?'9+':cnt;badge.style.display=cnt>0?'block':'none';}
}
function toggleNotifPanel(){
  const p=document.getElementById('notifPanel'),o=document.getElementById('notifOverlay');
  if(p.classList.contains('open')){closeNotifPanel();}

// ─── AUTO RESET ──────────────────────────────────────────────────
function checkAutoReset(){
  if(!S.settings.autoResetEnabled)return;
  const now=new Date();const dayOfWeek=now.getDay();
  const wk=isoWeek(now);const resetKey=`${wk}-day${S.settings.autoResetDay}`;
  if(dayOfWeek===S.settings.autoResetDay&&S.settings.lastResetWeek!==resetKey){
    S.kidDefs.forEach(k=>{
      const d=S.kids[k.id];if(!d)return;
      d.chores=d.chores.map(c=>({...c,done:false,pending:false}));
      d.homework=d.homework.map(h=>({...h,done:false,pending:false}));
    });
    S.pendingApprovals=[];
    S.settings.lastResetWeek=resetKey;
    pushNotif('Weekly Reset 🌅','All tasks cleared for a new week!','🌅');
    save();showToast('New week — all tasks reset! 🌅','🌅');
  }
}

// ─── CSV EXPORT ──────────────────────────────────────────────────
function exportCSV(){
  const rows=[['Kid','Week','Chores Done','HW Done','Points Earned','Rewards Redeemed','Points Spent']];
  S.kidDefs.forEach(k=>{
    const hist=S.weeklyHistory[k.id]||{};
    const allWeeks=new Set([...Object.keys(hist)]);
    S.rewardHistory.filter(r=>r.kidId===k.id&&r.status==='approved').forEach(r=>allWeeks.add(r.week));
    [...allWeeks].sort().forEach(wk=>{
      const wh=hist[wk]||{chores:0,homework:0,points:0};
      const red=S.rewardHistory.filter(r=>r.kidId===k.id&&r.week===wk&&r.status==='approved');
      rows.push([k.name,wk,wh.chores,wh.homework,wh.points,red.length,red.reduce((s,r)=>s+r.pts,0)]);
    });
  });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='makeba-star-chart.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('CSV exported! 📊','💾');
}

// ─── TASK ACTIONS ────────────────────────────────────────────────
function toggleTask(type,taskId){
  if(!canEdit(activeKidId)){showToast("That's not your tab! 🔒",'🚫');return;}
  const selDow=selectedViewDate.getDay();
  const today=new Date();today.setHours(0,0,0,0);
  const selDay=new Date(selectedViewDate);selDay.setHours(0,0,0,0);
  // Only allow checking on the actual today (not past/future)
  if(selDay.getTime()!==today.getTime()){showToast("You can only check today's tasks!",'📅');return;}
  const d=S.kids[activeKidId];
  const task=d[type].find(t=>t.id===taskId);if(!task)return;
  // Check task is active today
  if(!taskActiveOnDay(task,selDow)){showToast(`This chore isn't scheduled for today!`,'📅');return;}
  if(task.done&&!task.pending){
    task.done=false;task.pending=false;
    S.pendingApprovals=S.pendingApprovals.filter(a=>!(a.kidId===activeKidId&&a.type===type&&a.taskId===taskId));
    S.kids[activeKidId].points=Math.max(0,S.kids[activeKidId].points-pts(activeKidId));
    save();render();return;
  }
  if(task.pending||task.done)return;
  task.done=true;task.pending=true;
  const kid=S.kidDefs.find(k=>k.id===activeKidId);
  S.pendingApprovals.push({id:Date.now(),kidId:activeKidId,kidName:kid.name,kidAvatar:kid.avatar,type,taskId,label:task.label,icon:task.icon});
  pushNotif(`${kid.name} completed a task`,`${task.icon} ${task.label}`,kid.avatar);
  showToast('Waiting for parent approval ⏳','📋');
  save();render();
}
function approveTask(approvalId){
  const a=S.pendingApprovals.find(x=>x.id===approvalId);if(!a)return;
  S.pendingApprovals=S.pendingApprovals.filter(x=>x.id!==approvalId);
  const d=S.kids[a.kidId];
  const task=d[a.type].find(t=>t.id===a.taskId);
  if(task){task.done=true;task.pending=false;}
  const p=pts(a.kidId);d.points+=p;
  const today=new Date().toDateString();const yest=new Date(Date.now()-86400000).toDateString();
  if(d.lastDate!==today){d.streak=d.lastDate===yest?d.streak+1:1;d.lastDate=today;}
  const wk=isoWeek(new Date());
  if(!S.weeklyHistory[a.kidId])S.weeklyHistory[a.kidId]={};
  if(!S.weeklyHistory[a.kidId][wk])S.weeklyHistory[a.kidId][wk]={chores:0,homework:0,points:0};
  S.weeklyHistory[a.kidId][wk][a.type]++;S.weeklyHistory[a.kidId][wk].points+=p;
  checkBadges(d);confetti();showToast(`+${p} pts for ${a.kidName}! ✅`,'⭐');
  save();render();
}
function rejectTask(approvalId){
  const a=S.pendingApprovals.find(x=>x.id===approvalId);if(!a)return;
  S.pendingApprovals=S.pendingApprovals.filter(x=>x.id!==approvalId);
  const d=S.kids[a.kidId];const task=d[a.type].find(t=>t.id===a.taskId);
  if(task){task.done=false;task.pending=false;}
  showToast(`Not approved for ${a.kidName}`,'❌');save();render();
}
function checkBadges(d){
  const n=BADGE_DEFS.filter(b=>!d.badges.includes(b.id)&&b.check(d));
  if(n.length)d.badges=[...d.badges,...n.map(b=>b.id)];
}
function resetDay(kidId){
  const d=S.kids[kidId];
  d.chores=d.chores.map(c=>({...c,done:false,pending:false}));
  d.homework=d.homework.map(h=>({...h,done:false,pending:false}));
  S.pendingApprovals=S.pendingApprovals.filter(a=>a.kidId!==kidId);

}

function dragStart(e,kidId,type,taskId){
  dragKidId=kidId;dragType=type;dragTaskId=taskId;
  e.dataTransfer.effectAllowed='move';
  e.target.classList.add('dragging');
}
function dragEnd(e){e.target.classList.remove('dragging');}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dropOnDay(e,dayNum){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragTaskId===null)return;
  const kDef=S.kidDefs.find(k=>k.id===dragKidId);
  const kState=S.kids[dragKidId];
  if(!kDef||!kState)return;
  const defTask=kDef[dragType].find(t=>t.id===dragTaskId);
  const stateTask=kState[dragType].find(t=>t.id===dragTaskId);
  if(!defTask||!stateTask)return;
  // Toggle day assignment (add if not there, remove if already there)
  if(dayNum===-1){
    // Drop on "Everyday" toggle area — set everyday true
    defTask.everyday=true;stateTask.everyday=true;
    defTask.days=[];stateTask.days=[];
  } else {
    defTask.everyday=false;stateTask.everyday=false;
    if(!defTask.days.includes(dayNum)){defTask.days.push(dayNum);stateTask.days.push(dayNum);}
  }
  dragTaskId=null;dragKidId=null;dragType=null;
  save();render();
}
function removeFromDay(kidId,type,taskId,dayNum){
  const kDef=S.kidDefs.find(k=>k.id===kidId);
  const kState=S.kids[kidId];if(!kDef||!kState)return;
  const defTask=kDef[type].find(t=>t.id===taskId);
  const stateTask=kState[type].find(t=>t.id===taskId);
  if(!defTask||!stateTask)return;
  defTask.days=defTask.days.filter(d=>d!==dayNum);stateTask.days=stateTask.days.filter(d=>d!==dayNum);
  if(defTask.days.length===0&&!defTask.everyday){defTask.everyday=true;stateTask.everyday=true;}
  save();render();
}
function toggleEveryday(kidId,type,taskId){
  const kDef=S.kidDefs.find(k=>k.id===kidId);
  const kState=S.kids[kidId];if(!kDef||!kState)return;
  const defTask=kDef[type].find(t=>t.id===taskId);
  const stateTask=kState[type].find(t=>t.id===taskId);
  if(!defTask||!stateTask)return;
  defTask.everyday=!defTask.everyday;stateTask.everyday=!stateTask.everyday;
  if(defTask.everyday){defTask.days=[];stateTask.days=[];}
  save();render();
}

// ─── CALENDAR STRIP ──────────────────────────────────────────────
function renderCalStrip(kidId){
  const weekStart=getWeekStart(calWeekOffset);
  const today=new Date();today.setHours(0,0,0,0);
  const selDay=new Date(selectedViewDate);selDay.setHours(0,0,0,0);
  const kid=S.kidDefs.find(k=>k.id===kidId);
  const monthLabel=weekStart.toLocaleDateString([],{month:'long',year:'numeric'});

  const days=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart);d.setDate(d.getDate()+i);
    return d;
  });

  const daysHtml=days.map(d=>{
    const isToday=d.getTime()===today.getTime();
    const isSel=d.getTime()===selDay.getTime();
    const hasTasks=(getTasksForDay(kidId,'chores',d).length+getTasksForDay(kidId,'homework',d).length)>0;
    const dateStr=d.toISOString().split('T')[0];
    return `<div class="cal-day${isToday?' today':''}${isSel&&!isToday?' selected':''}${hasTasks?' has-tasks':''}" onclick="calSelectDay('${dateStr}')">
      <span class="cal-day-name">${DAY_SHORT[d.getDay()]}</span>
      <span class="cal-day-num">${d.getDate()}</span>
    </div>`;
  }).join('');

  const isMe=canEdit(activeKidId);

  const today=new Date();today.setHours(0,0,0,0);

  const badgesHtml=d.badges.length?`<div class="badges">${d.badges.map(bid=>{const b=BADGE_DEFS.find(x=>x.id===bid);return b?`<span class="badge">${b.icon} ${b.label}</span>`:''}).join('')}</div>`:'';

        :'';
    const clickFn=locked?`showToast('${isMe?"This isn't scheduled for today 📅":"Log in as "+kid.name+" to check tasks 🔒"}','📅')`:`toggleTask('${activeTab}',${t.id})`;
    return `<div class="task-row${locked?' locked-task':''}${isActive&&!locked?' today-task':''}" style="--tc:${c};${done?`background:${c}12;border-color:${c}40`:pend?'background:#FFF9F0;border-color:#FFD93D':isWrongDay?'opacity:.5':''}" onclick="${clickFn}">

  const cp=pctForDay(activeKidId,'chores',selectedViewDate);

  const hbg=hp===100?'linear-gradient(90deg,#22c55e,#4ade80)':`linear-gradient(90deg,${c},${c}88)`;

  const summaryRows=S.kidDefs.map(k=>{

    return `<div class="summary-row" onclick="activeKidId=${k.id};render()">

        <div style="display:flex;justify-content:space-between">

          <span class="sum-stats">⭐${kd.points} · 🔥${kd.streak}</span>
        </div>
        <div class="sum-bars">
          <div class="sum-track"><div class="sum-fill" style="width:${kcp}%;background:${k.color}"></div></div>
          <div class="sum-track"><div class="sum-fill" style="width:${khp}%;background:${k.color}"></div></div>
        </div>
        <div class="sum-pcts"><span class="sum-pct">Chores ${kcp}%</span><span class="sum-pct">HW ${khp}%</span></div>
      </div>
    </div>`;
  }).join('');

  return `
  ${banner}
  <div class="kid-tabs slide-in">${kidTabsHtml}</div>
  ${renderCalStrip(activeKidId)}
  ${lockNotice}
  <div class="card slide-in">
    <div class="card-head" style="background:linear-gradient(90deg,${c}18,${c}05);border-bottom-color:${c}22">
      <div class="card-avatar">${kid.avatar}</div>
      <div class="card-info">
        <div class="card-name">${kid.name}</div>
        <div class="tags">
          <span class="tag" style="color:${c};background:${c}18">${selDateLabel}</span>
          <span class="tag" style="color:#FF9F43;background:#FFF3E0">🔥 ${d.streak} streak</span>
          <span class="tag" style="color:#A78BFA;background:#F5F0FF">⭐ ${d.points} pts</span>
          ${isMe?`<span class="tag" style="color:#22c55e;background:#F0FFF4">✓ Signed in</span>`:''}
        </div>
      </div>
    </div>
    ${badgesHtml}
    <div class="prog-row">
      <div class="prog-col"><div class="prog-label"><span>🧹 Chores</span><span style="color:${cp===100?'#22c55e':c}">${cp}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${cp}%;background:${cbg}"></div></div></div>
      <div class="prog-col"><div class="prog-label"><span>📚 Homework</span><span style="color:${hp===100?'#22c55e':c}">${hp}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${hp}%;background:${hbg}"></div></div></div>
    </div>
    <div class="sub-tabs">

      <button class="sub-tab${activeTab==='homework'?' active':''}" style="${activeTab==='homework'?'background:'+c+';box-shadow:0 4px 12px '+c+'44':''}" onclick="activeTab='homework';render()">📚 Homework</button>
    </div>
    <div class="task-list">${taskRows}</div>

// ─── REWARDS PAGE ────────────────────────────────────────────────
function renderRewardsPage(){
  const kid=S.kidDefs.find(k=>k.id===activeKidId)||S.kidDefs[0];
  const d=kid?S.kids[kid.id]:{points:0};
  const wk=isoWeek(new Date());const isMe=loggedInKidId===kid?.id;
  const kidTabsHtml=S.kidDefs.map(k=>{
    const kd=S.kids[k.id]||{points:0};const active=k.id===activeKidId;
    return `<div class="kid-tab${active?' active':''}" style="--kc:${k.color};${active?'border-color:'+k.color:''}" onclick="activeKidId=${k.id};render()">
      <span class="av">${k.avatar}</span><div class="kn" style="${active?'color:'+k.color:''}">${k.name}</div>
      <div class="kp" style="${active?'color:'+k.color:''}">⭐ ${kd.points}</div></div>`;
  }).join('');
  const rewardsHtml=S.rewards.map(r=>{
    const canAfford=d&&d.points>=r.pts;
    const isPending=S.pendingRewardApprovals.some(a=>a.kidId===kid?.id&&a.rewardId===r.id&&a.week===wk);
    const wasApproved=S.rewardHistory.some(h=>h.kidId===kid?.id&&h.rewardId===r.id&&h.week===wk&&h.status==='approved');
    let cls='reward-card';
    if(isPending)cls+=' pending-redeem';else if(canAfford)cls+=' unlocked can-redeem';
    const ptsAway=r.pts-(d?.points||0);
    const progress=Math.min(100,Math.round(((d?.points||0)/r.pts)*100));
    const nudge=!canAfford&&!isPending?`<div class="reward-nudge">${ptsAway} pts to go!</div><div class="reward-nudge-bar"><div class="reward-nudge-fill" style="width:${progress}%"></div></div>`:'';
    let actionHtml='';
    if(wasApproved)actionHtml=`<div class="reward-unlocked-txt">✓ Redeemed this week!</div>`;
    else if(isPending)actionHtml=`<div class="reward-redeem-pending">⏳ Awaiting approval…</div>`;
    else if(isMe&&canAfford)actionHtml=`<button class="reward-redeem-btn" onclick="event.stopPropagation();requestReward(${r.id})">Redeem 🎁</button>`;
    else if(!isMe&&canAfford)actionHtml=`<div style="font-size:10px;color:#aaa;margin-top:4px;font-weight:600">Sign in to redeem</div>`;
    return `<div class="${cls}"><div class="reward-icon">${r.icon}</div><div class="reward-label">${r.label}</div><div class="reward-pts">⭐ ${r.pts} pts</div>${nudge}${actionHtml}</div>`;
  }).join('');
  const kidHistory=S.rewardHistory.filter(h=>h.kidId===kid?.id);
  const kidPending=S.pendingRewardApprovals.filter(a=>a.kidId===kid?.id).map(a=>({...a,status:'pending'}));
  const allEntries=[...kidPending,...kidHistory];
  const weekMap={};allEntries.forEach(e=>{if(!weekMap[e.week])weekMap[e.week]=[];weekMap[e.week].push(e);});
  const sortedWeeks=Object.keys(weekMap).sort().reverse();
  const historyHtml=sortedWeeks.length===0?'<p style="color:#ccc;font-size:13px;font-weight:700;text-align:center;padding:16px 0">No reward history yet 🎁</p>'
    :sortedWeeks.map(wkKey=>{
      const entries=weekMap[wkKey];
      const totalSpent=entries.filter(e=>e.status==='approved').reduce((s,e)=>s+e.pts,0);
      return `<div class="week-section">
        <div class="week-header"><span class="week-label">📅 ${wkKey===wk?'This week':wkKey.replace('-W',' / W')}</span>${totalSpent>0?`<span class="week-badge">−${totalSpent} pts</span>`:''}</div>
        ${entries.map(e=>`<div class="redeem-history-item"><span class="rhi-icon">${e.rewardIcon}</span><div class="rhi-info"><div class="rhi-name">${e.rewardLabel}</div><div class="rhi-meta">${e.date||e.week}</div></div><span class="rhi-pts">−${e.pts} pts</span><span class="rhi-status ${e.status}">${e.status==='approved'?'✓ Approved':e.status==='rejected'?'✗ Declined':'⏳ Pending'}</span></div>`).join('')}
      </div>`;
    }).join('');
  return `<div class="kid-tabs slide-in">${kidTabsHtml}</div>
  <div class="card slide-in" style="padding:14px 16px">
    <div class="section-title" style="margin-top:0">🎁 Rewards Store</div>
    ${isMe?`<p style="font-size:12px;font-weight:700;color:#aaa;margin-bottom:12px">You have <strong style="color:${kid.color}">⭐ ${d.points} pts</strong></p>`:`<p style="font-size:12px;font-weight:600;color:#aaa;margin-bottom:12px">Viewing ${kid?.name}'s store.</p>`}
    <div class="rewards-grid">${rewardsHtml}</div>
  </div>
  <div class="card slide-in" style="padding:14px 16px"><div class="section-title" style="margin-top:0">📋 Reward History</div>${historyHtml}</div>`;
}

      <span class="av">${k.avatar}</span><div class="kn" style="${active?'color:'+k.color:''}">${k.name}</div></div>`;
  }).join('')}</div>`;

  const allTasks=[...(schedKid?.chores||[]).map(t=>({...t,type:'chores'})),...(schedKid?.homework||[]).map(t=>({...t,type:'homework'}))];

  const dayColsHtml=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart);d.setDate(d.getDate()+i);
    const dow=d.getDay();const isToday=d.getTime()===today.getTime();
    const assignedHere=allTasks.filter(t=>!t.everyday&&t.days?.includes(dow));
    return `<div class="sched-day-col">
      <div class="sched-day-head${isToday?' today-head':''}">
        <span class="sched-day-name">${DAY_NAMES[dow]}</span>
        <span class="sched-day-date">${d.getDate()}/${d.getMonth()+1}</span>
      </div>
      <div class="sched-drop-zone" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropOnDay(event,${dow})">
        ${assignedHere.length===0?`<div style="font-size:11px;color:#ccc;font-weight:600;padding:4px">Drop tasks here</div>`
          :assignedHere.map(t=>`<span class="sched-chip" draggable="true" ondragstart="dragStart(event,${schedKidId},'${t.type}',${t.id})" ondragend="dragEnd(event)">
            ${t.icon} ${t.label}
            <span class="chip-remove" onclick="removeFromDay(${schedKidId},'${t.type}',${t.id},${dow})">✕</span>
          </span>`).join('')}
      </div>
    </div>`;
  }).join('');

  const everydayTasks=allTasks.filter(t=>t.everyday);
  const unscheduledTasks=allTasks.filter(t=>!t.everyday&&(!t.days||t.days.length===0));

  const everydayHtml=`<div style="background:#F0FFF4;border:1.5px solid #22c55e40;border-radius:14px;padding:10px 12px;margin-bottom:10px">
    <div style="font-size:12px;font-weight:800;color:#22c55e;margin-bottom:6px">🔄 Everyday tasks</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">
      ${everydayTasks.length===0?'<span style="font-size:11px;color:#aaa;font-weight:600">None assigned</span>'
        :everydayTasks.map(t=>`<span class="sched-chip" draggable="true" ondragstart="dragStart(event,${schedKidId},'${t.type}',${t.id})" ondragend="dragEnd(event)" style="border-color:#22c55e40">
          ${t.icon} ${t.label}
          <input type="checkbox" checked title="Everyday" style="width:12px;height:12px;accent-color:#22c55e;cursor:pointer;margin-left:2px" onclick="toggleEveryday(${schedKidId},'${t.type}',${t.id})">
        </span>`).join('')}
    </div>
  </div>`;

  const unschedHtml=unscheduledTasks.length>0?`<div class="sched-unassigned">
    <div class="sched-unassigned-title">📌 Unscheduled — drag onto a day or check Everyday</div>
    <div style="display:flex;flex-wrap:wrap">
      ${unscheduledTasks.map(t=>`<span class="sched-chip" draggable="true" ondragstart="dragStart(event,${schedKidId},'${t.type}',${t.id})" ondragend="dragEnd(event)">
        ${t.icon} ${t.label}
        <input type="checkbox" title="Everyday" style="width:12px;height:12px;accent-color:#22c55e;cursor:pointer;margin-left:2px" onclick="toggleEveryday(${schedKidId},'${t.type}',${t.id})">
      </span>`).join('')}
    </div>
  </div>`:'';

  const kidsHtml=S.kidDefs.map(k=>{
    const cOpen=collapsibleOpen['kid_'+k.id];const hwOpen=collapsibleOpen['hw_'+k.id];
    return `<div class="kid-edit-card">
      <div class="kid-edit-head"><span class="kid-edit-avatar">${k.avatar}</span><span class="kid-edit-name">${k.name}</span><button class="btn btn-red btn-sm" onclick="removeKid(${k.id})">Remove</button></div>
      <div class="form-row"><input class="form-input" value="${k.name}" placeholder="Name" onchange="updateKidName(${k.id},this.value)"/>
        <input class="form-input" type="number" value="${k.age}" min="1" max="17" style="width:60px;flex:none" onchange="updateKidAge(${k.id},this.value)"/></div>
      <div style="font-size:11px;font-weight:700;color:#aaa;margin-bottom:4px">Avatar</div>
      <div class="avatar-picker">${AVATARS.map(av=>`<div class="avatar-opt${k.avatar===av?' selected':''}" onclick="setKidAvatar(${k.id},'${av}')">${av}</div>`).join('')}</div>
      <div class="collapsible-head" onclick="collapsibleOpen['kid_${k.id}']=!cOpen;render()"><span>🧹 Chores (${k.chores.length})</span><span>${cOpen?'▲':'▼'}</span></div>
      <div class="collapsible-body${cOpen?' open':''}">
        ${k.chores.map(t=>`<div class="task-edit-row"><span class="task-edit-icon">${t.icon}</span><span class="task-edit-label">${t.label} ${t.everyday?'<span style="font-size:10px;color:#22c55e">• everyday</span>':t.days?.map(d=>DAY_SHORT[d]).join(', ')||''}</span><button class="task-edit-remove" onclick="removeTaskFromKid(${k.id},'chores',${t.id})">✕</button></div>`).join('')}
        <div class="icon-picker">${TASK_ICONS_CHORE.map(ic=>`<div class="icon-opt" data-kid="${k.id}" data-type="chores" onclick="this.parentElement.querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('selected'));this.classList.add('selected')">${ic}</div>`).join('')}</div>
        <div class="form-row"><input id="addTask_${k.id}_chores" class="form-input" placeholder="Add chore…" onkeydown="if(event.key==='Enter')addTaskToKid(${k.id},'chores')"/><button class="btn btn-purple" onclick="addTaskToKid(${k.id},'chores')">+</button></div>
      </div>
      <div class="collapsible-head" onclick="collapsibleOpen['hw_${k.id}']=!hwOpen;render()"><span>📚 Homework (${k.homework.length})</span><span>${hwOpen?'▲':'▼'}</span></div>
      <div class="collapsible-body${hwOpen?' open':''}">
        ${k.homework.map(t=>`<div class="task-edit-row"><span class="task-edit-icon">${t.icon}</span><span class="task-edit-label">${t.label} ${t.everyday?'<span style="font-size:10px;color:#22c55e">• everyday</span>':t.days?.map(d=>DAY_SHORT[d]).join(', ')||''}</span><button class="task-edit-remove" onclick="removeTaskFromKid(${k.id},'homework',${t.id})">✕</button></div>`).join('')}
        <div class="icon-picker">${TASK_ICONS_HW.map(ic=>`<div class="icon-opt" data-kid="${k.id}" data-type="homework" onclick="this.parentElement.querySelectorAll('.icon-opt').forEach(x=>x.classList.remove('selected'));this.classList.add('selected')">${ic}</div>`).join('')}</div>
        <div class="form-row"><input id="addTask_${k.id}_homework" class="form-input" placeholder="Add homework task…" onkeydown="if(event.key==='Enter')addTaskToKid(${k.id},'homework')"/><button class="btn btn-purple" onclick="addTaskToKid(${k.id},'homework')">+</button></div>
      </div>
    </div>`;
  }).join('');

  const kidPinsHtml=S.kidDefs.map(k=>`<div class="kid-pin-row">
    <span class="kid-pin-av">${k.avatar}</span><span class="kid-pin-name">${k.name}</span>
    <span style="font-size:11px;color:#aaa;font-weight:600;margin-right:4px">${k.pin?'✓ set':'no PIN'}</span>
    <input id="kidpin_${k.id}" class="kid-pin-input" type="password" maxlength="4" placeholder="····" inputmode="numeric" value="${k.pin||''}"/>
    <button class="kid-pin-save" onclick="saveKidPin(${k.id})">Save</button>
  </div>`).join('');

  const rewardEditHtml=S.rewards.map(r=>`<div class="reward-edit-card"><span class="reward-edit-icon">${r.icon}</span>
    <div class="reward-edit-info"><div class="reward-edit-name">${r.label}</div><div class="reward-edit-pts">⭐ ${r.pts} pts</div></div>
    <button class="btn btn-red btn-sm" onclick="removeReward(${r.id})">Remove</button></div>`).join('');

  return `<div class="slide-in">
    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0;color:#FF9F43">⏳ Task Approvals</div>${approvalsHtml}</div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0;color:#7C3AED">🎁 Reward Requests</div>
      <p style="font-size:12px;color:#aaa;font-weight:600;margin-bottom:8px">Approve to deduct points.</p>
      ${rewardApprovalsHtml}</div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0">📅 Weekly Schedule</div>
      <p style="font-size:12px;color:#aaa;font-weight:600;margin-bottom:10px">Drag tasks onto days. Check ☑ to make a task everyday. New tasks default to everyday.</p>
      ${schedKidTabsHtml}
      ${everydayHtml}
      ${unschedHtml}
      <div style="font-size:12px;font-weight:800;color:#555;margin-bottom:8px">📆 This week</div>
      <div class="sched-wrap">${dayColsHtml}</div>
    </div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0">⭐ Adjust Points</div>${pointsHtml}</div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0">⚙️ Settings</div>
      <div class="setting-row">
        <div class="setting-label"><div class="setting-title">🔄 Auto Weekly Reset</div><div class="setting-sub">Clears all tasks on selected day</div></div>
        <input type="checkbox" id="autoResetToggle" style="width:20px;height:20px;cursor:pointer;accent-color:#7C3AED" ${S.settings.autoResetEnabled?'checked':''}/>
      </div>
      <div class="form-row" style="margin-top:4px">
        <label style="font-size:13px;font-weight:700;color:#555;flex:1">Reset day</label>
        <select id="resetDaySelect" class="form-select">${DAY_NAMES.map((d,i)=>`<option value="${i}" ${S.settings.autoResetDay===i?'selected':''}>${d}</option>`).join('')}</select>
        <button class="btn btn-purple btn-sm" onclick="saveSettings()">Save</button>
      </div>
      <div style="font-size:11px;color:#aaa;font-weight:600;margin-top:4px">Last reset: ${S.settings.lastResetWeek||'Never'}</div>
    </div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0">🔑 Kid PINs</div>
      <p style="font-size:12px;color:#aaa;font-weight:600;margin-bottom:8px">Leave blank for open access.</p>
      ${kidPinsHtml}</div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0">👧 Manage Kids</div>${kidsHtml}
      <div class="divider"></div>
      <div style="font-size:12px;font-weight:800;color:#555;margin-bottom:8px">➕ Add New Kid</div>
      <div class="form-row"><input id="newKidName" class="form-input" placeholder="Name"/>
        <input id="newKidAge" class="form-input" type="number" min="1" max="17" placeholder="Age" style="width:64px;flex:none"/></div>
      <div class="form-row"><input id="newKidAvatar" class="form-input" placeholder="Avatar emoji e.g. 🐱" maxlength="2"/>
        <button class="btn btn-purple" onclick="addKid()">Add Kid</button></div>
    </div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0">🎁 Manage Rewards</div>${rewardEditHtml}
      <div class="divider"></div>
      <div style="font-size:12px;font-weight:800;color:#555;margin-bottom:8px">➕ Add Reward</div>
      <div class="form-row"><input id="newRewardLabel" class="form-input" placeholder="Reward name"/><input id="newRewardIcon" class="form-input" placeholder="🎁" maxlength="2" style="width:56px;flex:none"/></div>
      <div class="form-row"><input id="newRewardPts" class="form-input" type="number" min="1" placeholder="Points needed"/><button class="btn btn-purple" onclick="addReward()">Add</button></div>
    </div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0">🔐 Parent PIN</div>
      <p style="font-size:12px;color:#aaa;font-weight:600;margin-bottom:8px">Default: 1234</p>
      <div class="pin-change-row"><input id="newPinInput" class="pin-change-input" type="password" maxlength="4" placeholder="····" inputmode="numeric"/>
        <button class="btn btn-purple" onclick="changePin()">Save PIN</button></div>
    </div>

    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div class="section-title" style="margin-top:0">💾 Export Data</div>
      <p style="font-size:12px;color:#aaa;font-weight:600;margin-bottom:10px">Download all weekly history as CSV.</p>
      <button class="btn btn-orange" onclick="exportCSV()" style="width:100%;padding:12px">📊 Download CSV Report</button>
    </div>

    <div style="text-align:center;padding:8px 0">
      <button class="btn btn-gray" onclick="parentUnlocked=false;showLoginScreen()">🔒 Lock &amp; Sign Out</button>
    </div>
  </div>`;
}

// ── INIT ────────────────────────────────────────────────────────
checkAutoReset();
showLoginScreen();
</script>
</body>
</html>
